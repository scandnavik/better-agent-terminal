name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild @lydell/node-pty for Electron (Windows)
        if: matrix.platform == 'win'
        run: npx --yes @electron/rebuild

      - name: Rebuild @lydell/node-pty for Electron (macOS/Linux)
        if: matrix.platform != 'win'
        run: npx --yes @electron/rebuild

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update version and build
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: node scripts/build-version.js

      - name: Package for Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Import Code Signing Certificate
        if: matrix.platform == 'mac'
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Verify Apple notarization credentials
        if: matrix.platform == 'mac'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Testing notarytool credentials..."
          xcrun notarytool history --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" 2>&1 || true

      - name: Package for macOS
        if: matrix.platform == 'mac'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish never

      - name: Package for Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Upload Windows artifact
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: |
            release/*.zip
            release/*.exe

      - name: Upload macOS artifact
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: release/*.dmg

      - name: Upload Linux artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/release-win/*
            artifacts/release-mac/*
            artifacts/release-linux/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-pre') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        if: ${{ !contains(github.ref, '-pre') }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: tonyq-org/homebrew-tap
          event-type: update-cask
          client-payload: '{"version": "${{ steps.version.outputs.VERSION }}"}'

  choco:
    needs: [build, release]
    runs-on: windows-latest
    if: ${{ !contains(github.ref, '-pre') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-win
          path: artifacts

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Find installer and compute checksum
        id: checksum
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $exe = Get-ChildItem -Path artifacts -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $exe) { throw "No .exe found in artifacts" }
          Write-Host "Found installer: $($exe.Name)"
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash
          Write-Host "SHA256: $hash"
          echo "SHA256=$hash" >> $env:GITHUB_OUTPUT
          echo "EXE_NAME=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Prepare Chocolatey package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $checksum = "${{ steps.checksum.outputs.SHA256 }}"

          # Update version in nuspec
          $nuspec = Get-Content choco/better-agent-terminal.nuspec -Raw
          $nuspec = $nuspec -replace '<version>.*?</version>', "<version>$version</version>"
          Set-Content choco/better-agent-terminal.nuspec $nuspec

          # Update checksum in install script
          $install = Get-Content choco/tools/chocolateyinstall.ps1 -Raw
          $install = $install -replace '__CHECKSUM64__', $checksum
          Set-Content choco/tools/chocolateyinstall.ps1 $install

      - name: Pack and push
        shell: pwsh
        run: |
          choco pack choco/better-agent-terminal.nuspec --output-directory .
          $nupkg = Get-ChildItem -Filter "*.nupkg" | Select-Object -First 1
          if (-not $nupkg) { throw "choco pack failed - no .nupkg file created" }
          Write-Host "Pushing $($nupkg.Name)..."
          choco push $nupkg.FullName --source https://push.chocolatey.org/ --api-key "${{ secrets.CHOCO_API_KEY }}"
